# MailHog no soporta auth ni STARTTLS — anular los valores hardcodeados del deployment base
apiVersion: apps/v1
kind: Deployment
metadata:
  name: email-service
  namespace: puj-platform
spec:
  template:
    spec:
      containers:
        - name: email-service
          env:
            - name: SMTP_AUTH
              value: "false"
            - name: SMTP_STARTTLS
              value: "false"
