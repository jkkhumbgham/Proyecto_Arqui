apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../k8s/
  - mailhog.yaml

# Las imágenes base ya usan puj/<svc>:local + imagePullPolicy: Never
# No se necesita sustitución de imágenes — las imágenes se construyen en el daemon de minikube

patches:
  - path: patch-storageclass.yaml
  - path: patch-pull-policy.yaml
  - path: patch-ingress.yaml
  - path: patch-email-smtp.yaml
