# frontend-lb.conf — OpenResty (nginx + LuaJIT)
# Montar en: /etc/nginx/conf.d/default.conf
# El http{} wrapper lo provee OpenResty (/usr/local/openresty/nginx/conf/nginx.conf)
#
# Sticky session strategy:
#   - Primera request: Docker DNS elige una réplica (round-robin entre IPs de web-ui)
#   - nginx captura la IP real del upstream via $upstream_addr
#   - Guarda esa IP:puerto en la cookie PUJROUTE del browser
#   - Requests siguientes: Lua lee PUJROUTE y enruta directamente a esa réplica
#   - Si la réplica muere: proxy falla → siguiente recarga reasigna la cookie

server {
    listen 80;

    # Docker DNS interno — re-resuelve dinámicamente cuando hay nuevas réplicas
    resolver 127.0.0.11 valid=5s ipv6=off;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_read_timeout    120s;
    proxy_send_timeout    60s;
    proxy_next_upstream   error timeout http_502 http_503;

    location / {
        set $backend "web-ui:8080";

        access_by_lua_block {
            local cookie = ngx.var.cookie_PUJROUTE
            if cookie and cookie ~= "" then
                -- Rutar a la réplica específica pinned en la cookie
                ngx.var.backend = cookie
            end
            -- Sin cookie: Docker DNS asigna una réplica (round-robin)
        }

        proxy_pass http://$backend;

        header_filter_by_lua_block {
            -- Emitir cookie solo si el browser no la tiene aún
            if not ngx.var.cookie_PUJROUTE or ngx.var.cookie_PUJROUTE == "" then
                local addr = ngx.var.upstream_addr
                if addr and addr ~= "" then
                    -- upstream_addr puede ser "1.2.3.4:8080" con posibles espacios
                    local sticky = addr:match("^%s*([^,%s]+)%s*$") or addr
                    -- Preservar cookies existentes del upstream (JSESSIONID de WildFly, etc.)
                    local existing = ngx.header["Set-Cookie"]
                    local new_cookie = "PUJROUTE=" .. sticky
                        .. "; Path=/; HttpOnly; SameSite=Lax"
                    if type(existing) == "table" then
                        table.insert(existing, new_cookie)
                        ngx.header["Set-Cookie"] = existing
                    elseif existing then
                        ngx.header["Set-Cookie"] = {existing, new_cookie}
                    else
                        ngx.header["Set-Cookie"] = new_cookie
                    end
                end
            end
        }
    }

    # Health check propio del load balancer
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
