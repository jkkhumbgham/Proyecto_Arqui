# nginx.conf — API Gateway
# Enruta las llamadas del web-ui a cada microservicio según el path prefix.
#
# Escalado:
#   1. docker compose up -d --scale user-service=2
#   2. docker exec puj-api-gateway nginx -s reload
#
# Al hacer reload, NGINX re-resuelve cada hostname via Docker DNS.
# Si el servicio tiene 2 réplicas, Docker DNS devuelve 2 IPs → NGINX
# crea 2 servidores en el upstream y hace round-robin (least_conn) entre ellos.

worker_processes auto;
error_log  /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    log_format gw '$remote_addr [$time_local] "$request" $status '
                  '→ $upstream_addr ($upstream_response_time s)';
    access_log /var/log/nginx/access.log gw;

    # ── Timeouts globales ─────────────────────────────────────────────────────
    proxy_connect_timeout    5s;
    proxy_read_timeout       60s;
    proxy_send_timeout       60s;
    proxy_next_upstream      error timeout http_500 http_502 http_503;
    proxy_next_upstream_tries 2;

    # ── Headers comunes ───────────────────────────────────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── Upstreams ──────────────────────────────────────────────────────────────
    # Cuando Docker DNS devuelve múltiples IPs (múltiples réplicas), NGINX crea
    # múltiples server entries y hace least_conn (round-robin ponderado) entre ellos.
    # Requiere nginx -s reload después de escalar para que NGINX re-resuelva el DNS.

    upstream user_svc         { least_conn; server user-service:8080 max_fails=3 fail_timeout=30s; keepalive 16; }
    upstream course_svc       { least_conn; server course-service:8080 max_fails=3 fail_timeout=30s; keepalive 16; }
    upstream assessment_svc   { least_conn; server assessment-service:8080 max_fails=3 fail_timeout=30s; keepalive 16; }
    upstream collaboration_svc{ least_conn; server collaboration-service:8080 max_fails=3 fail_timeout=30s; keepalive 16; }
    upstream analytics_svc    { least_conn; server analytics-service:8080 max_fails=3 fail_timeout=30s; keepalive 8; }
    upstream email_svc        { server email-service:8080 max_fails=3 fail_timeout=30s; }

    server {
        listen 80;

        # ── Routing por path prefix ───────────────────────────────────────────

        # user-service: auth + gestión de usuarios
        location ~ ^/api/v1/(auth|users)(/|$) {
            proxy_pass http://user_svc;
        }

        # course-service: cursos, módulos, lecciones, inscripciones, contenido
        location ~ ^/api/v1/(courses|modules|lessons|enrollments|contents)(/|$) {
            proxy_pass http://course_svc;
        }

        # assessment-service: evaluaciones, submissions, preguntas, reglas adaptativas
        location ~ ^/api/v1/(assessments|submissions|questions|adaptive-rules)(/|$) {
            proxy_pass http://assessment_svc;
        }

        # collaboration-service: foros, grupos de estudio
        location ~ ^/api/v1/(forums|study-groups)(/|$) {
            proxy_pass http://collaboration_svc;
        }

        # analytics-service (.NET): analytics y reportes
        location ~ ^/api/v1/analytics(/|$) {
            proxy_pass http://analytics_svc;
        }

        # ── Health checks individuales por servicio ───────────────────────────
        # Java services: /api/v1/health   |   .NET + email: /health

        location = /health/user {
            proxy_pass http://user_svc/api/v1/health;
        }
        location = /health/course {
            proxy_pass http://course_svc/api/v1/health;
        }
        location = /health/assessment {
            proxy_pass http://assessment_svc/api/v1/health;
        }
        location = /health/collaboration {
            proxy_pass http://collaboration_svc/api/v1/health;
        }
        location = /health/analytics {
            proxy_pass http://analytics_svc/health;
        }
        location = /health/email {
            proxy_pass http://email_svc/health;
        }

        # ── Gateway health ────────────────────────────────────────────────────
        location = /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ── Fallback ──────────────────────────────────────────────────────────
        location / {
            return 404 '{"error":"route not found"}';
            add_header Content-Type application/json;
        }
    }
}
