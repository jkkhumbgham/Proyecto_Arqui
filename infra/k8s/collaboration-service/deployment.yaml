apiVersion: apps/v1
kind: Deployment
metadata:
  name: collaboration-service
  namespace: puj-platform
  labels:
    app: collaboration-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: collaboration-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0     # zero-downtime — las conexiones WS existentes siguen vivas en el pod viejo
  template:
    metadata:
      labels:
        app: collaboration-service
    spec:
      # Grace period extendido: los pods deben drenar conexiones WebSocket antes de terminar
      terminationGracePeriodSeconds: 60
      containers:
        - name: collaboration-service
          image: REGISTRY/puj/collaboration-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: DB_URL
              value: "jdbc:postgresql://postgres:6432/learning_platform"
            - name: DB_SCHEMA
              value: "collaboration"
            - name: DB_USER
              valueFrom:
                secretKeyRef: { name: platform-secrets, key: DB_USER }
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef: { name: platform-secrets, key: DB_PASSWORD }
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef: { name: platform-secrets, key: REDIS_PASSWORD }
            - name: RABBITMQ_HOST
              value: "rabbitmq"
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef: { name: platform-secrets, key: RABBITMQ_USER }
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef: { name: platform-secrets, key: RABBITMQ_PASSWORD }
            - name: RABBITMQ_VHOST
              value: "puj_vhost"
            - name: JWT_PUBLIC_KEY
              valueFrom:
                secretKeyRef: { name: platform-secrets, key: JWT_PUBLIC_KEY }
            - name: USER_SERVICE_URL
              value: "http://user-service:8080"
          readinessProbe:
            httpGet:
              path: /api/v1/forums
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/forums
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 30
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: collaboration-service
  namespace: puj-platform
spec:
  selector:
    app: collaboration-service
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
  # Sin sessionAffinity: el broadcast cross-pod lo maneja Redis Pub/Sub
  sessionAffinity: None
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: collaboration-service-hpa
  namespace: puj-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: collaboration-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
