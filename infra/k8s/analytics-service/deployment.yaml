apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: puj-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
        - name: analytics-service
          image: REGISTRY/puj/analytics-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: ConnectionStrings__DefaultConnection
              value: "Host=postgres;Port=6432;Database=learning_platform;Username=$(DB_USER);Password=$(DB_PASSWORD);SearchPath=analytics"
            - name: DB_USER
              valueFrom:
                secretKeyRef: { name: platform-secrets, key: DB_USER }
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef: { name: platform-secrets, key: DB_PASSWORD }
            - name: RabbitMQ__Host
              value: "rabbitmq"
            - name: RabbitMQ__Port
              value: "5672"
            - name: RabbitMQ__Username
              valueFrom:
                secretKeyRef: { name: platform-secrets, key: RABBITMQ_USER }
            - name: RabbitMQ__Password
              valueFrom:
                secretKeyRef: { name: platform-secrets, key: RABBITMQ_PASSWORD }
            - name: RabbitMQ__VirtualHost
              value: "puj_vhost"
            - name: Jwt__PublicKey
              valueFrom:
                secretKeyRef: { name: platform-secrets, key: JWT_PUBLIC_KEY }
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests: { memory: "256Mi", cpu: "250m" }
            limits:   { memory: "512Mi", cpu: "500m" }
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: puj-platform
spec:
  selector:
    app: analytics-service
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: analytics-service-hpa
  namespace: puj-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: analytics-service
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
