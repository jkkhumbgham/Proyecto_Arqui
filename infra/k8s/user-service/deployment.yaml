apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: puj-platform
  labels:
    app: user-service
    version: blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: user-service
        version: blue
    spec:
      containers:
        - name: user-service
          image: REGISTRY/puj/user-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: DB_URL
              value: "jdbc:postgresql://postgres:6432/learning_platform"
            - name: DB_SCHEMA
              value: "users"
            - name: DB_USER
              valueFrom:
                secretKeyRef: { name: platform-secrets, key: DB_USER }
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef: { name: platform-secrets, key: DB_PASSWORD }
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef: { name: platform-secrets, key: REDIS_PASSWORD }
            - name: RABBITMQ_HOST
              value: "rabbitmq"
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef: { name: platform-secrets, key: RABBITMQ_USER }
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef: { name: platform-secrets, key: RABBITMQ_PASSWORD }
            - name: RABBITMQ_VHOST
              value: "puj_vhost"
            - name: JWT_PRIVATE_KEY
              valueFrom:
                secretKeyRef: { name: platform-secrets, key: JWT_PRIVATE_KEY }
            - name: JWT_PUBLIC_KEY
              valueFrom:
                secretKeyRef: { name: platform-secrets, key: JWT_PUBLIC_KEY }
          readinessProbe:
            httpGet:
              path: /api/v1/auth/me
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/auth/me
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 30
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: puj-platform
spec:
  selector:
    app: user-service
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: user-service-hpa
  namespace: puj-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: user-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
