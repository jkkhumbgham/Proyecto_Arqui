apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-ui
  namespace: puj-platform
  labels:
    app: web-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-ui
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: web-ui
    spec:
      containers:
        - name: web-ui
          image: puj/web-ui:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            # URLs directas a cada servicio — K8s ClusterIP Services hacen el load balancing
            - name: USER_SERVICE_URL
              value: "http://user-service:8080"
            - name: COURSE_SERVICE_URL
              value: "http://course-service:8080"
            - name: ASSESSMENT_SERVICE_URL
              value: "http://assessment-service:8080"
            - name: COLLABORATION_SERVICE_URL
              value: "http://collaboration-service:8080"
            - name: ANALYTICS_SERVICE_URL
              value: "http://analytics-service:8080"
            - name: EMAIL_SERVICE_URL
              value: "http://email-service:8080"
            - name: MINIO_ENDPOINT
              value: "http://minio:9000"
            - name: MINIO_ACCESS_KEY
              value: "puj_minio"
            - name: MINIO_SECRET_KEY
              value: "puj_minio_secret"
            - name: MINIO_BUCKET
              value: "course-files"
            - name: MINIO_PUBLIC_URL
              value: "http://platform.local"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: web-ui
  namespace: puj-platform
spec:
  selector:
    app: web-ui
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
  # Sticky sessions manejadas por el Nginx Ingress Controller (cookie PUJROUTE en ingress.yaml)
  # No se usa sessionAffinity a nivel de Service para no interferir con el Ingress
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web-ui-hpa
  namespace: puj-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web-ui
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
