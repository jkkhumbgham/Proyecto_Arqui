<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:c="jakarta.tags.core">
<ui:composition template="/WEB-INF/templates/authenticated.xhtml">
<ui:define name="pageTitle">Resultado</ui:define>
<ui:define name="content">

    <h2 class="page-title">Resultado de la evaluación</h2>

    <div class="card result-box" style="max-width:560px;margin:0 auto;">

        <!-- Score circle -->
        <div class="result-score" style="font-size:3.5rem;font-weight:700;
             color:#{assessmentBean.submissionResult['passed'] ? '#27ae60' : '#c0392b'};
             text-align:center;margin-bottom:.5rem;">
            #{assessmentBean.submissionResult['score']}%
        </div>

        <!-- Passed / failed label -->
        <p style="text-align:center;font-size:1.15rem;margin:0 0 1.5rem;">
            <c:if test="#{assessmentBean.submissionResult['passed']}">
                <span style="color:#27ae60;font-weight:600;">¡Aprobado!</span>
            </c:if>
            <c:if test="#{not assessmentBean.submissionResult['passed']}">
                <span style="color:#c0392b;font-weight:600;">No aprobado</span>
            </c:if>
        </p>

        <!-- Adaptive recommendation (only when rule fires) -->
        <c:if test="#{not empty assessmentBean.adaptiveRecommendation or assessmentBean.supplementaryLesson != null}">
            <div style="background:#fff8e1;border:1px solid #ffe082;border-radius:10px;
                        padding:1.2rem 1.4rem;margin-bottom:1.5rem;">
                <div style="display:flex;align-items:flex-start;gap:.75rem;">
                    <span style="font-size:1.4rem;flex-shrink:0;">📚</span>
                    <div style="flex:1;">
                        <strong style="color:#7f6b00;font-size:1rem;">Material de repaso recomendado</strong>

                        <c:if test="#{not empty assessmentBean.adaptiveRecommendation}">
                            <p style="margin:.5rem 0 0;color:#555;font-size:.92rem;line-height:1.55;">
                                #{assessmentBean.adaptiveRecommendation}
                            </p>
                        </c:if>

                        <c:if test="#{assessmentBean.supplementaryLesson != null}">
                            <div style="margin-top:.85rem;padding:.7rem .9rem;
                                        background:#fffde7;border-radius:6px;
                                        border-left:3px solid #f9a825;">
                                <div style="font-size:.8rem;color:#7f6b00;text-transform:uppercase;
                                            letter-spacing:.05em;margin-bottom:.25rem;">Lección recomendada</div>
                                <strong style="color:#1a3a6b;">#{assessmentBean.supplementaryLesson['title']}</strong>
                            </div>
                            <div style="margin-top:.85rem;">
                                <h:link outcome="/views/lesson-viewer" styleClass="btn btn-primary btn-sm"
                                        style="display:inline-block;text-decoration:none;">
                                    <f:param name="lessonId" value="#{assessmentBean.supplementaryLessonId}"/>
                                    <f:param name="courseId" value="#{assessmentBean.backCourseId}"/>
                                    Ver lección de repaso →
                                </h:link>
                            </div>
                        </c:if>
                    </div>
                </div>
            </div>
        </c:if>

        <!-- Actions -->
        <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;">
            <c:if test="#{not empty assessmentBean.backCourseId}">
                <h:link outcome="/views/course-detail" styleClass="btn btn-primary">
                    <f:param name="courseId" value="#{assessmentBean.backCourseId}"/>
                    Volver al curso
                </h:link>
            </c:if>
            <h:link value="Ir al Dashboard" outcome="/views/dashboard" styleClass="btn btn-secondary"/>
        </div>
    </div>

</ui:define>
</ui:composition>
</html>
