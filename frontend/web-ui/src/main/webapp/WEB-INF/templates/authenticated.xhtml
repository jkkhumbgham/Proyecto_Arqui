<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">
<h:head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>PUJ — <ui:insert name="pageTitle">Panel</ui:insert></title>
    <h:outputStylesheet library="css" name="app.css"/>
</h:head>
<f:metadata>
    <f:viewAction action="#{sessionBean.guardPage}"/>
    <ui:insert name="pageMetadata"/>
</f:metadata>
<h:body>

    <nav class="navbar">
        <span class="brand">PUJ Learning</span>
        <h:link value="Dashboard"    outcome="/views/dashboard"/>
        <h:link value="Cursos"       outcome="/views/courses"/>
        <h:link value="Evaluaciones" outcome="/views/assessments"/>
        <h:link value="Foros"        outcome="/views/forums"/>
        <h:link value="Grupos"       outcome="/views/study-groups"/>
        <h:link value="Admin"        outcome="/views/admin"
                rendered="#{sessionBean.hasRole('ADMIN')}"/>
        <span class="user-info">#{sessionBean.userEmail} (#{sessionBean.userRole})</span>
        <h:form>
            <h:commandButton value="Salir" action="#{sessionBean.logout}" styleClass="btn btn-secondary btn-sm"/>
        </h:form>
    </nav>

    <div class="main-content">
        <h:messages globalOnly="true" styleClass="messages"
                    errorClass="ui-messages-error"
                    warnClass="ui-messages-warn"
                    infoClass="ui-messages-info"/>
        <ui:insert name="content"/>
    </div>
</h:body>
</html>
